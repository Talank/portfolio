<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Talank Baral</title>
	<meta name="description" content="Talank Baral &ndash; PhD student in Computer Science at George Mason University, working on software testing and continuous integration.">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
	<header class="site-header">
		<div class="header-inner">
			<a class="brand" href="#top">Talank Baral</a>
			<button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="primaryNav">
				<span></span><span></span><span></span>
			</button>
			<nav id="primaryNav">
				<ul>
					<li><a href="#about">About</a></li>
					<li><a href="#news">News</a></li>
					<li><a href="#publications">Publications</a></li>
					<li><a href="#experience">Experience</a></li>
					<li><a href="#blogs">Blogs</a></li>
					<li><a class="resume-link" href="resume.pdf" target="_blank" rel="noopener">Resume</a></li>
				</ul>
			</nav>
		</div>
	</header>

	<main id="top">
		<section id="about" class="about-section">
			<div class="about-grid">
				<img id="profilePhoto" class="profile-photo" src="" alt="" width="300">
				<div class="about-text">
					<p class="eyebrow" id="profileTitle"></p>
					<h1 id="profileName"></h1>
					<p class="bio" id="profileBio"></p>
					<ul class="tag-list" id="profileTags"></ul>
				</div>
			</div>
		</section>

		<section id="news" class="section">
			<h2>News</h2>
			<ul class="news-list" id="newsList"></ul>
		</section>

		<section id="publications" class="section">
			<h2>Publications</h2>
			<div class="pub-list" id="publicationsList"></div>
		</section>

		<section id="experience" class="section">
			<h2>Experience</h2>
			<ol class="timeline" id="experienceList"></ol>
		</section>

		<section id="blogs" class="section">
			<h2>Blogs</h2>
			<p id="blogsText"></p>
		</section>
	</main>

	<footer class="site-footer">
		<p>&copy; <span id="year"></span> Talank Baral.</p>
	</footer>

	<script src="js/main.js" defer></script>
</body>
</html>
