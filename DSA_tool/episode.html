<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Episode — DSA Crash Course</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="../shared/auth-ui.css">
</head>
<body>
<div id="site-header"></div>
<main class="wrap">
  <div id="episode-root">Loading…</div>
</main>
<script src="data/schedule.js"></script>
<script src="data/episodes.js"></script>
<script src="data/characters.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/auth-ui.js"></script>
<script src="js/app.js"></script>
<script src="js/audio-engine.js"></script>
<script src="js/voice-engine.js"></script>
<script src="js/episode-engine.js"></script>
<script>
  buildHeader('episodes.html');
  (function () {
    function qs(name) { return new URLSearchParams(window.location.search).get(name); }
    const id = qs('id');
    const ep = (window.EPISODES || {})[id];
    const root = document.getElementById('episode-root');
    if (!ep) {
      root.innerHTML = '<p>Episode not found. <a href="episodes.html">Back to episodes</a>.</p>';
      return;
    }
    document.title = `Ep. ${ep.epNumber}: ${ep.title} — DSA Crash Course`;

    root.innerHTML = `
      <div class="pill">Episode ${ep.epNumber}</div>
      <div class="pill time">${ep.leetcode.difficulty}</div>
      <h1>${ep.title}</h1>
      <p class="lede">Retelling <a href="${ep.leetcode.url}" target="_blank" rel="noopener">${ep.leetcode.name} (LeetCode #${ep.leetcode.number})</a> —
      full pattern write-up: <a href="pattern.html?id=${ep.patternId}">${ep.patternId.replace(/-/g, ' ')}</a>.</p>

      <div class="card">
        <b>The problem:</b> ${ep.problem}<br>
        <code style="display:block; margin-top:0.5rem; color: var(--text-dim);">${ep.example}</code>
      </div>

      <div id="episode-scene"></div>
      <p style="color:var(--text-dim); font-size:0.8rem; margin-top:0.4rem;">
        Music and sound effects are generated live in your browser (Web Audio API) — original, not sourced from the show.
        Click "Music" to start the loop (browsers require a click before audio can play).
      </p>

      <h2>Complexity</h2>
      <div class="card">${ep.complexity}</div>

      <h2>Common pitfall</h2>
      <div class="callout pitfall">${ep.pitfall}</div>

      <h2>Solution</h2>
      <pre><code>${ep.solution.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]))}</code></pre>

      <p><a href="episodes.html">← All episodes</a></p>
    `;

    renderEpisode(document.getElementById('episode-scene'), ep);
  })();
</script>
</body>
</html>
