<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Presentation — DSA Crash Course</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="../shared/auth-ui.css">
<script>
// Start fetching the narration manifest, the requested deck, and the first
// slide's audio clip immediately — in parallel with the page's own scripts —
// instead of letting the engine discover them one after another at boot.
// Preload only warms the HTTP cache, so the engine's own <script> injection
// and Audio() loads find everything already downloaded.
(function () {
  var lang = 'ne';
  try { if (localStorage.getItem('dsa-pres-lang') === 'en') lang = 'en'; } catch (e) {}
  var dir = lang === 'en' ? 'data/english' : 'data/nepali';
  function pre(href, as) {
    var l = document.createElement('link');
    l.rel = 'preload'; l.href = href; l.as = as;
    document.head.appendChild(l);
  }
  pre(dir + '/audio/manifest.js', 'script');
  var id = new URLSearchParams(location.search).get('id');
  if (id && /^[\w-]+$/.test(id)) {
    pre(dir + '/' + id + '.js', 'script');
    // Clips are named <deck>-<slide>.<ext>, so slide 0's URL is known before
    // the manifest arrives. Preload the same format the engine will pick.
    var opus = document.createElement('audio').canPlayType('audio/ogg; codecs=opus') !== '';
    pre(dir + '/audio/' + id + '-0.' + (opus ? 'opus' : 'mp3'), 'audio');
  }
})();
</script>
</head>
<body>
<div id="site-header"></div>
<main class="wrap">
  <div id="nepali-root">Loading…</div>
  <footer class="pagenav" id="nepali-footer-nav"></footer>
</main>
<script src="data/schedule.js"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/auth-ui.js"></script>
<script src="js/app.js"></script>
<script src="js/visuals.js"></script>
<script src="js/presentation-engine.js"></script>
<script>
  buildHeader('presentation.html');
  initPresentation({ page: 'presentation.html' });
</script>
</body>
</html>
